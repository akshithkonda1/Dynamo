# CI for Dynamo — native macOS Swift package (build + unit tests).
# This is the required status check for day-to-day quality.

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: swift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Show Swift version
      run: swift --version

    - name: Build
      run: |
        # Finder xattrs on resource forks break ad-hoc codesign on some runners.
        xattr -cr . 2>/dev/null || true
        swift build -v

    - name: Test
      run: |
        xattr -cr .build 2>/dev/null || true
        swift test -v --parallel
