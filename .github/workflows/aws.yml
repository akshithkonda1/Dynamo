# OPTIONAL Amazon ECS deploy template.
#
# Dynamo is a native macOS app, not a container service. This file ships as a
# GitHub starter template with placeholder values (MY_AWS_REGION, etc.).
# Running it on every push to main was failing CI with:
#   Region is not valid: MY_AWS_REGION
#
# It is therefore manual-only. To actually use it you must:
#   1. Add a Dockerfile suitable for your service
#   2. Replace the MY_* env placeholders below
#   3. Configure AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY secrets
#   4. Run this workflow via Actions → "Deploy to Amazon ECS" → Run workflow
#
# Day-to-day CI for Dynamo is `.github/workflows/swift.yml` (build + test).

name: Deploy to Amazon ECS

on:
  workflow_dispatch: {}

env:
  AWS_REGION: MY_AWS_REGION                   # e.g. us-west-2
  ECR_REPOSITORY: MY_ECR_REPOSITORY
  ECS_SERVICE: MY_ECS_SERVICE
  ECS_CLUSTER: MY_ECS_CLUSTER
  ECS_TASK_DEFINITION: MY_ECS_TASK_DEFINITION # e.g. .aws/task-definition.json
  CONTAINER_NAME: MY_CONTAINER_NAME

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Guard — refuse placeholder config
      run: |
        set -euo pipefail
        if [[ "${AWS_REGION}" == MY_* ]] || [[ "${AWS_REGION}" == "MY_AWS_REGION" ]]; then
          echo "::error::AWS ECS workflow is not configured for Dynamo."
          echo "This is a macOS app. Use the Swift workflow for CI, or fill in"
          echo "real ECR/ECS values and AWS secrets before running deploy."
          exit 1
        fi

    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        if [[ ! -f Dockerfile ]]; then
          echo "::error::No Dockerfile in repo — cannot build an image for ECS."
          exit 1
        fi
        docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
        docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
